name: Build and release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore and build
        run: msbuild GHubProfileUtility.csproj /restore /p:Configuration=Release /p:CI=true

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item bin\Release\net48\GHubXBOXGamePassProfileFixer.exe release\GHubXBOXGamePassProfileFixer.exe
          $hash = (Get-FileHash release\GHubXBOXGamePassProfileFixer.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  GHubXBOXGamePassProfileFixer.exe" | Set-Content release\GHubXBOXGamePassProfileFixer.exe.sha256 -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GHubXBOXGamePassProfileFixer-${{ github.sha }}
          path: release/
          if-no-files-found: error

      - name: Attest release executable
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/GHubXBOXGamePassProfileFixer.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" release\GHubXBOXGamePassProfileFixer.exe release\GHubXBOXGamePassProfileFixer.exe.sha256 --generate-notes --verify-tag
